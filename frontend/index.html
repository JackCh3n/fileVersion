<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileVersion 批量改名</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header class="titlebar">
      <span class="logo">FV</span>
      <span class="title">批量文件改名</span>
      <span class="spacer"></span>
      <button class="btn-mini" id="btnInstall">安装右键菜单</button>
      <button class="btn-mini" id="btnUninstall">卸载</button>
      <button class="btn-mini" id="btnRevert">撤销上次</button>
    </header>

    <div class="main">
      <!-- 左侧控制区 -->
      <aside class="panel">
        <div class="tabs">
          <button class="tab active" data-tab="overall">整体</button>
          <button class="tab" data-tab="replace">替换</button>
          <button class="tab" data-tab="addremove">添加/删除</button>
        </div>

        <!-- 整体 Tab -->
        <section class="tabpage" data-page="overall">
          <label class="field">
            <span>命名规则</span>
            <input type="text" id="tplPattern" value="A_#" />
          </label>
          <p class="hint">用 <code>*</code> 插入原文件名，<code>#</code> 插入编号。例：<code>A_#</code>→A_001，<code>*V.#</code>→原文件V.01</p>
          <div class="row">
            <label class="field small"><span>开始于</span><input type="number" id="tplStart" value="1" /></label>
            <label class="field small"><span>增量</span><input type="number" id="tplInc" value="1" /></label>
            <label class="field small"><span>位数</span><input type="number" id="tplDigits" value="3" /></label>
          </div>
          <div class="row">
            <label class="field small"><span>补齐符</span>
              <select id="tplPad"><option value="0">0</option><option value=" ">空格</option></select>
            </label>
            <label class="check"><input type="checkbox" id="tplRandom" /> 随机编号</label>
            <label class="check"><input type="checkbox" id="tplRandomLower" /> 小写</label>
          </div>
          <label class="field">
            <span>扩展名改成</span>
            <input type="text" id="tplExt" placeholder="留空=不改" />
          </label>
          <label class="check"><input type="checkbox" id="optClean" /> clean 整理（去(N)、日期规整V.日期）</label>
          <label class="check"><input type="checkbox" id="optVersion" /> 追加版本号 V.时间戳</label>
          <label class="check"><input type="checkbox" id="optVersionMove" /> 原地改名(move) 而非复制(copy)</label>
          <label class="field">
            <span>冲突处理</span>
            <select id="conflict">
              <option value="auto">自动编号避免冲突</option>
              <option value="skip">跳过冲突文件</option>
              <option value="overwrite">覆盖已存在文件</option>
            </select>
          </label>
        </section>

        <!-- 替换 Tab -->
        <section class="tabpage hidden" data-page="replace">
          <label class="field"><span>把</span><input type="text" id="repFind" /></label>
          <label class="field"><span>替换成</span><input type="text" id="repReplace" /></label>
          <label class="check"><input type="checkbox" id="repRegex" /> 使用正则</label>
          <label class="check"><input type="checkbox" id="repIgnore" /> 忽略大小写</label>
        </section>

        <!-- 添加/删除 Tab -->
        <section class="tabpage hidden" data-page="addremove">
          <label class="field"><span>文件名前添加</span><input type="text" id="arPrefix" /></label>
          <label class="field"><span>文件名后添加</span><input type="text" id="arSuffix" /></label>
          <div class="row">
            <label class="field small"><span>插入位置</span><input type="number" id="arInsertAt" value="0" /></label>
            <label class="field"><span>插入内容</span><input type="text" id="arInsertStr" /></label>
          </div>
          <label class="field"><span>删除子串</span><input type="text" id="arRemoveStr" /></label>
          <div class="row">
            <label class="field small"><span>删除起始</span><input type="number" id="arRemoveFrom" value="0" /></label>
            <label class="field small"><span>删除个数</span><input type="number" id="arRemoveCount" value="0" /></label>
          </div>
        </section>
      </aside>

      <!-- 右侧文件列表 -->
      <section class="files">
        <div class="filebar">
          <button id="btnAdd">添加(A)</button>
          <button id="btnRemove">移除(I)</button>
          <button id="btnClear">全部移除</button>
          <span class="count" id="fileCount">0 个文件</span>
        </div>
        <div class="tablewrap">
          <table id="fileTable">
            <thead>
              <tr><th class="col-old">原文件名</th><th class="col-prev">预览</th><th class="col-res">结果</th></tr>
            </thead>
            <tbody id="fileBody"></tbody>
          </table>
          <div class="dropzone" id="dropzone">拖拽文件到此处，或点击“添加”</div>
        </div>
      </section>
    </div>

    <footer class="statusbar">
      <span id="statusText">就绪</span>
      <span class="spacer"></span>
      <button class="btn-primary" id="btnRename">开始重命名(R)</button>
      <button id="btnHelp">帮助(H)</button>
    </footer>
  </div>

  <input type="file" id="fileInput" multiple webkitdirectory style="display:none" />
  <script src="js/app.js"></script>
</body>
</html>
